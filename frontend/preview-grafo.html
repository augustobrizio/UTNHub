<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
      "outline": "#8d919b", "on-surface-variant": "#c3c6d1",
      "surface-container-low": "#131b2e", "surface-container-high": "#222a3d",
      "primary": "#adc6ff", "surface-dim": "#0b1326", "on-background": "#dae2fd",
      "outline-variant": "#434750", "surface-container": "#171f33",
      "surface-container-lowest": "#060e20", "surface-variant": "#2d3449",
      "surface": "#0b1326", "on-primary-container": "#6fa1ff",
      "surface-bright": "#31394d", "secondary": "#7dffa2", "on-primary": "#002e69",
      "primary-container": "#003678", "tertiary": "#ffb950",
      "surface-container-highest": "#2d3449", "on-surface": "#dae2fd",
    }, fontFamily: { headline: ["Manrope"], body: ["Inter"] } } }
  };
</script>
<style>
  body { background: #0b1326; }
  .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400; }
  .material-symbols-filled { font-variation-settings: "FILL" 1, "wght" 400; }
  .bg-blueprint { background-image: radial-gradient(circle at 2px 2px, rgba(67,71,80,.18) 1px, transparent 0); background-size: 40px 40px; }
  .node-glow-approved { box-shadow: 0 0 16px rgba(125,255,162,.22); border: 1px solid #7dffa2; }
  .node-glow-regular  { box-shadow: 0 0 16px rgba(255,185,80,.18); border: 1px solid #ffb950; }
  .node-glow-cursable { box-shadow: 0 0 16px rgba(173,198,255,.22); border: 1px solid #adc6ff; }
  .node-glow-cursando { box-shadow: 0 0 16px rgba(173,198,255,.18); border: 1px dashed #adc6ff; }
  .node-locked { border: 1px solid rgba(67,71,80,.45); }
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<div id="app"></div>

<script>
// =============================================================================
// Dataset: plan ISI 2023 con estados simulados
// =============================================================================
const TRONCALES = [
  { codigo:"1", nombre:"Análisis Matemático I", anio:1, requeridas:[], estado:"aprobado", nota:8 },
  { codigo:"2", nombre:"Álgebra y Geometría Analítica", anio:1, requeridas:[], estado:"aprobado", nota:9 },

  { codigo:"4", nombre:"Inglés I", anio:1, requeridas:[], estado:"aprobado", nota:10 },
  { codigo:"5", nombre:"Lógica y Estructuras Discretas", anio:1, requeridas:[], estado:"aprobado", nota:9 },
  { codigo:"6", nombre:"Algoritmos y Estructuras de Datos", anio:1, requeridas:[], estado:"regular", nota:null },
  { codigo:"7", nombre:"Arquitectura de Computadoras", anio:1, requeridas:[], estado:"regular", nota:null },
  { codigo:"8", nombre:"Sistemas y Procesos de Negocio", anio:1, requeridas:[], estado:"regular", nota:null },

  { codigo:"9", nombre:"Análisis Matemático II", anio:2, requeridas:[{c:"1",t:"regular"},{c:"2",t:"regular"}], estado:"cursando", nota:null },
  { codigo:"10", nombre:"Física II", anio:2, requeridas:[{c:"1",t:"regular"},{c:"3",t:"regular"}], estado:"cursable", nota:null },
  { codigo:"11", nombre:"Ingeniería y Sociedad", anio:2, requeridas:[], estado:"regular", nota:null },
  { codigo:"12", nombre:"Inglés II", anio:2, requeridas:[{c:"4",t:"regular"}], estado:"cursable", nota:null },
  { codigo:"13", nombre:"Sintaxis y Semántica de los Lenguajes", anio:2, requeridas:[{c:"5",t:"regular"},{c:"6",t:"regular"}], estado:"libre", nota:null },
  { codigo:"14", nombre:"Paradigmas de Programación", anio:2, requeridas:[{c:"5",t:"regular"},{c:"6",t:"regular"}], estado:"libre", nota:null },
  { codigo:"15", nombre:"Sistemas Operativos", anio:2, requeridas:[{c:"7",t:"regular"}], estado:"cursable", nota:null },
  { codigo:"16", nombre:"Análisis de Sistemas de Información", anio:2, requeridas:[{c:"6",t:"regular"},{c:"8",t:"regular"}], estado:"libre", nota:null },

  { codigo:"17", nombre:"Probabilidad y Estadística", anio:3, requeridas:[{c:"1",t:"regular"},{c:"2",t:"regular"}], estado:"cursable", nota:null },
  { codigo:"18", nombre:"Economía", anio:3, requeridas:[{c:"1",t:"aprobada"},{c:"2",t:"aprobada"}], estado:"cursable", nota:null },
  { codigo:"19", nombre:"Base de Datos", anio:3, requeridas:[{c:"13",t:"regular"},{c:"16",t:"regular"},{c:"5",t:"aprobada"},{c:"6",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"20", nombre:"Desarrollo de Software", anio:3, requeridas:[{c:"14",t:"regular"},{c:"16",t:"regular"},{c:"5",t:"aprobada"},{c:"6",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"21", nombre:"Comunicación de Datos", anio:3, requeridas:[{c:"3",t:"aprobada"},{c:"7",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"22", nombre:"Análisis Numérico", anio:3, requeridas:[{c:"9",t:"regular"},{c:"1",t:"aprobada"},{c:"2",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"23", nombre:"Diseño de Sistemas de Información", anio:3, requeridas:[{c:"14",t:"regular"},{c:"16",t:"regular"},{c:"4",t:"aprobada"},{c:"6",t:"aprobada"},{c:"8",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"ADUSI", nombre:"Seminario Integrador", anio:3, requeridas:[{c:"16",t:"regular"},{c:"6",t:"aprobada"},{c:"8",t:"aprobada"},{c:"13",t:"aprobada"},{c:"14",t:"aprobada"}], estado:"libre", nota:null },

  { codigo:"24", nombre:"Legislación", anio:4, requeridas:[{c:"11",t:"regular"}], estado:"libre", nota:null },
  { codigo:"25", nombre:"Ingeniería y Calidad de Software", anio:4, requeridas:[{c:"19",t:"regular"},{c:"20",t:"regular"},{c:"23",t:"regular"},{c:"13",t:"aprobada"},{c:"14",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"26", nombre:"Redes de Datos", anio:4, requeridas:[{c:"15",t:"regular"},{c:"21",t:"regular"}], estado:"libre", nota:null },
  { codigo:"27", nombre:"Investigación Operativa", anio:4, requeridas:[{c:"17",t:"regular"},{c:"22",t:"regular"}], estado:"libre", nota:null },
  { codigo:"28", nombre:"Simulación", anio:4, requeridas:[{c:"17",t:"regular"},{c:"9",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"29", nombre:"Tec. para la Automatización", anio:4, requeridas:[{c:"10",t:"regular"},{c:"22",t:"regular"},{c:"9",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"30", nombre:"Administración de Sist. Información", anio:4, requeridas:[{c:"18",t:"regular"},{c:"23",t:"regular"},{c:"16",t:"aprobada"}], estado:"libre", nota:null },

  { codigo:"31", nombre:"Inteligencia Artificial", anio:5, requeridas:[{c:"28",t:"regular"},{c:"17",t:"aprobada"},{c:"22",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"32", nombre:"Ciencia de Datos", anio:5, requeridas:[{c:"28",t:"regular"},{c:"17",t:"aprobada"},{c:"19",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"33", nombre:"Sistemas de Gestión", anio:5, requeridas:[{c:"18",t:"regular"},{c:"27",t:"regular"},{c:"23",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"34", nombre:"Gestión Gerencial", anio:5, requeridas:[{c:"24",t:"regular"},{c:"30",t:"regular"},{c:"18",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"35", nombre:"Seguridad en los SI", anio:5, requeridas:[{c:"26",t:"regular"},{c:"30",t:"regular"},{c:"20",t:"aprobada"},{c:"21",t:"aprobada"}], estado:"libre", nota:null },
  { codigo:"36", nombre:"Proyecto Final", anio:5, requeridas:[{c:"25",t:"regular"},{c:"26",t:"regular"},{c:"30",t:"regular"},{c:"12",t:"aprobada"},{c:"20",t:"aprobada"},{c:"23",t:"aprobada"}], estado:"libre", nota:null },
];

const NODE_W = 200, NODE_H = 86, COL_W = 280, ROW_H = 110, PAD_X = 60, PAD_Y = 60;

// =============================================================================
// Layout
// =============================================================================
const grupos = new Map();
TRONCALES.forEach(m => {
  if (!grupos.has(m.anio)) grupos.set(m.anio, []);
  grupos.get(m.anio).push(m);
});
const aniosOrd = [...grupos.keys()].sort();
const pos = new Map();
let maxRows = 0;
aniosOrd.forEach((anio, colIdx) => {
  const lista = grupos.get(anio);
  maxRows = Math.max(maxRows, lista.length);
  lista.forEach((m, rowIdx) => {
    pos.set(m.codigo, { x: PAD_X + colIdx*COL_W, y: PAD_Y + rowIdx*ROW_H });
  });
});
const W = aniosOrd.length * COL_W + PAD_X;
const H = maxRows * ROW_H + PAD_Y * 2;

// =============================================================================
// Edges (todas las correlativas, dirigidas desde "requerida" hacia "materia")
// =============================================================================
const edges = [];
TRONCALES.forEach(m => {
  m.requeridas.forEach(r => edges.push({ desde: r.c, hacia: m.codigo, tipo: r.t }));
});

// =============================================================================
// Estados visuales
// =============================================================================
const ESTILO = {
  aprobado: { glow: "node-glow-approved", icon: "check_circle", filled: true,  iconColor: "text-secondary", tagColor: "text-secondary", progress: "bg-secondary w-full" },
  regular:  { glow: "node-glow-regular",  icon: "schedule",     filled: false, iconColor: "text-tertiary",  tagColor: "text-tertiary",  progress: "bg-tertiary w-4/5" },
  cursando: { glow: "node-glow-cursando", icon: "play_circle",  filled: false, iconColor: "text-primary",   tagColor: "text-primary",   progress: "bg-primary w-1/2" },
  cursable: { glow: "node-glow-cursable", icon: "bolt",         filled: false, iconColor: "text-primary",   tagColor: "text-primary",   progress: "bg-primary w-1/4" },
  libre:    { glow: "node-locked",        icon: "lock",         filled: false, iconColor: "text-outline",   tagColor: "text-outline",   progress: "bg-outline w-0" },
};

// =============================================================================
// Counters
// =============================================================================
const counts = { aprobado: 0, regular: 0, cursando: 0, cursable: 0, libre: 0 };
TRONCALES.forEach(m => counts[m.estado]++);
const total = TRONCALES.length;
const pct = (counts.aprobado / total * 100).toFixed(1);

// =============================================================================
// Render
// =============================================================================
const sidebar = `
<aside class="h-screen w-64 fixed left-0 top-0 z-40 bg-[#0b1326] flex flex-col py-8 px-4 space-y-2 pt-20 bg-gradient-to-r from-transparent to-slate-800/20">
  <div class="px-4 mb-8">
    <h2 class="text-primary font-black uppercase tracking-widest text-xs mb-1 font-headline">Student Panel</h2>
    <p class="text-outline text-[10px] font-medium tracking-wide">Engineering Blueprint</p>
  </div>
  <nav class="flex flex-col space-y-1">
    ${[
      ["dashboard","Dashboard",false],["smart_toy","Chatbot",false],
      ["calendar_month","Calendario",false],["account_tree","Grafo/Carrera",true],
      ["campaign","Novedades",false],["badge","Profesores",false],
      ["person","Perfil",false],
    ].map(([icon,label,active]) => `
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 group ${active ? "bg-primary/10 text-primary border-r-2 border-secondary shadow-[0_0_15px_rgba(125,255,162,0.2)]" : "text-outline hover:text-on-surface hover:bg-surface-container/40"}">
        <span class="material-symbols-outlined text-[20px]">${icon}</span>
        <span class="text-sm font-medium tracking-wide">${label}</span>
      </a>
    `).join("")}
  </nav>
  <div class="mt-auto pt-8 border-t border-white/5 px-4 pb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-primary/20 text-primary font-headline font-bold">JR</div>
      <div>
        <p class="text-on-surface font-semibold text-xs">Julián Rossi</p>
        <p class="text-outline text-[10px]">Legajo: 194.201</p>
      </div>
    </div>
  </div>
</aside>`;

const topnav = `
<nav class="fixed top-0 w-full z-50 border-b border-white/10 flex justify-between items-center px-6 h-16" style="background: rgba(49,57,77,.6); backdrop-filter: blur(14px); box-shadow: 0 8px 32px rgba(0,0,0,0.8);">
  <div class="flex items-center gap-4 pl-64">
    <span class="text-xl font-bold tracking-tighter text-primary font-headline">UTNHub</span>
    <span class="text-on-surface-variant/60 text-xs uppercase tracking-widest hidden sm:inline">ISI · UTN FRRO</span>
  </div>
  <div class="flex items-center gap-6">
    <div class="hidden md:flex items-center bg-surface-container-low px-4 py-1.5 rounded-full border border-outline-variant/30">
      <span class="material-symbols-outlined text-sm text-outline mr-2">search</span>
      <input class="bg-transparent border-none focus:outline-none text-sm text-on-surface-variant placeholder:text-outline w-48" placeholder="Buscar materias..." type="text">
    </div>
    <div class="flex items-center gap-4 text-outline">
      <button class="hover:text-primary transition-colors relative"><span class="material-symbols-outlined">notifications</span><span class="absolute top-0 right-0 w-2 h-2 bg-secondary rounded-full"></span></button>
      <button class="hover:text-primary transition-colors"><span class="material-symbols-outlined">account_circle</span></button>
    </div>
  </div>
</nav>`;

const stats = `
<div class="flex flex-wrap gap-3">
  <div class="bg-surface-container px-5 py-4 rounded-xl border-l-4 border-secondary node-glow-approved">
    <p class="text-[10px] uppercase tracking-widest text-secondary font-bold mb-1">Aprobadas</p>
    <p class="text-2xl font-black font-headline">${counts.aprobado}<span class="text-sm font-normal text-on-surface-variant/60 ml-1">/ ${total}</span></p>
  </div>
  <div class="bg-surface-container px-5 py-4 rounded-xl border-l-4 border-tertiary node-glow-regular">
    <p class="text-[10px] uppercase tracking-widest text-tertiary font-bold mb-1">Regulares</p>
    <p class="text-2xl font-black font-headline">${counts.regular}</p>
  </div>
  <div class="bg-surface-container px-5 py-4 rounded-xl border-l-4 border-primary node-glow-cursable">
    <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">Cursables</p>
    <p class="text-2xl font-black font-headline">${counts.cursable}</p>
  </div>
  <div class="bg-surface-container px-5 py-4 rounded-xl border-l-4 border-primary node-glow-cursable">
    <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">Progreso</p>
    <p class="text-2xl font-black font-headline">${pct}%</p>
  </div>
</div>`;

const filtros = `
<div class="flex flex-wrap gap-4">
  <div class="flex flex-col gap-1.5">
    <label class="text-[10px] uppercase tracking-widest font-bold text-outline">Año de cursada</label>
    <select class="bg-surface-container-highest border-none text-sm rounded-lg px-4 py-2 text-on-surface min-w-[160px] cursor-pointer">
      <option>Todos los años</option>
      ${aniosOrd.map(a => `<option>${a}º Año</option>`).join("")}
    </select>
  </div>
  <div class="flex flex-col gap-1.5">
    <label class="text-[10px] uppercase tracking-widest font-bold text-outline">Estado</label>
    <select class="bg-surface-container-highest border-none text-sm rounded-lg px-4 py-2 text-on-surface min-w-[160px] cursor-pointer">
      <option>Cualquier estado</option><option>Aprobada</option><option>Regular</option>
      <option>Cursando</option><option>Cursable</option><option>Bloqueada</option>
    </select>
  </div>
</div>`;

const leyenda = `
<div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-xs text-on-surface-variant">
  <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-secondary shadow-[0_0_8px_rgba(125,255,162,.6)]"></span><span class="font-medium">Aprobadas</span></div>
  <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-tertiary shadow-[0_0_8px_rgba(255,185,80,.6)]"></span><span class="font-medium">Regulares</span></div>
  <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-primary shadow-[0_0_8px_rgba(173,198,255,.6)]"></span><span class="font-medium">Cursables</span></div>
  <div class="flex items-center gap-2 opacity-60"><span class="w-3 h-3 rounded-full bg-outline-variant"></span><span class="font-medium">Bloqueadas</span></div>
  <span class="w-px h-5 bg-outline-variant/30 mx-2 hidden md:inline-block"></span>
  <div class="flex items-center gap-2"><svg width="28" height="8"><line x1="0" y1="4" x2="28" y2="4" stroke="#adc6ff" stroke-width="2"/></svg><span class="font-medium">Req. cursar</span></div>
  <div class="flex items-center gap-2"><svg width="28" height="8"><line x1="0" y1="4" x2="28" y2="4" stroke="#ffb950" stroke-width="2"/></svg><span class="font-medium">Req. rendir</span></div>
</div>`;

// SVG canvas
const colsHTML = aniosOrd.map(a => {
  const x = PAD_X + (aniosOrd.indexOf(a)) * COL_W + NODE_W/2;
  return `<text x="${x}" y="28" text-anchor="middle" fill="#8d919b" font-family="Manrope" font-weight="700" font-size="11" letter-spacing="2" style="text-transform:uppercase">${a}º Año</text>`;
}).join("");

const edgesHTML = edges.map(e => {
  const a = pos.get(e.desde), b = pos.get(e.hacia);
  if (!a || !b) return "";
  const x1 = a.x + NODE_W, y1 = a.y + NODE_H/2, x2 = b.x, y2 = b.y + NODE_H/2;
  const cx = Math.max(40, (x2 - x1) / 2);
  const stroke = e.tipo === "aprobada" ? "#ffb950" : "#adc6ff";
  const marker = e.tipo === "aprobada" ? "url(#arrow-aprobada)" : "url(#arrow-regular)";
  return `<path d="M ${x1} ${y1} C ${x1+cx} ${y1}, ${x2-cx} ${y2}, ${x2} ${y2}" fill="none" stroke="${stroke}" stroke-width="1.4" opacity="0.7" marker-end="${marker}"/>`;
}).join("");

const nodosHTML = TRONCALES.map(m => {
  const p = pos.get(m.codigo); if (!p) return "";
  const s = ESTILO[m.estado];
  return `
    <foreignObject x="${p.x}" y="${p.y}" width="${NODE_W}" height="${NODE_H}" style="overflow: visible">
      <div xmlns="http://www.w3.org/1999/xhtml" class="w-full h-full p-3 bg-surface-container-high rounded-xl cursor-pointer transition-all duration-200 ${s.glow} hover:scale-[1.03]">
        <div class="flex justify-between items-start mb-1.5">
          <span class="text-[9px] font-bold uppercase tracking-tighter ${s.tagColor}">${m.anio}º · ${m.codigo}</span>
          <span class="material-symbols-outlined text-[14px] ${s.iconColor} ${s.filled ? 'material-symbols-filled' : ''}">${s.icon}</span>
        </div>
        <h3 class="text-[12px] font-bold leading-tight mb-2 text-on-surface" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${m.nombre}</h3>
        <div class="w-full bg-surface-dim h-1 rounded-full overflow-hidden"><div class="h-full ${s.progress}"></div></div>
        ${m.nota != null ? `<div class="mt-1.5 text-[10px] text-on-surface-variant">Nota: <span class="text-on-surface font-semibold">${m.nota}</span></div>` : ""}
      </div>
    </foreignObject>`;
}).join("");

const canvas = `
<div class="relative w-full h-[760px] bg-surface-container-low rounded-3xl overflow-auto bg-blueprint">
  <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
    <defs>
      <marker id="arrow-regular" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#adc6ff"/></marker>
      <marker id="arrow-aprobada" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ffb950"/></marker>
    </defs>
    ${colsHTML}
    <g class="opacity-60">${edgesHTML}</g>
    ${nodosHTML}
  </svg>
  <div class="absolute bottom-6 right-6 flex flex-col gap-2 p-2 rounded-xl border border-outline-variant/20" style="background: rgba(45,52,73,.8); backdrop-filter: blur(14px)">
    <button class="w-10 h-10 flex items-center justify-center hover:bg-primary/20 rounded-lg text-on-surface transition-colors"><span class="material-symbols-outlined">add</span></button>
    <button class="w-10 h-10 flex items-center justify-center hover:bg-primary/20 rounded-lg text-on-surface transition-colors"><span class="material-symbols-outlined">remove</span></button>
    <button class="w-10 h-10 flex items-center justify-center hover:bg-primary/20 rounded-lg text-on-surface transition-colors"><span class="material-symbols-outlined">center_focus_weak</span></button>
  </div>
</div>`;

const main = `
${topnav}${sidebar}
<main class="pl-64 pt-16 min-h-screen bg-blueprint">
  <div class="p-8 max-w-[1600px] mx-auto">
    <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
      <div class="space-y-2">
        <p class="text-[10px] uppercase tracking-widest font-bold text-outline">ISI · Plan 2023</p>
        <h1 class="text-4xl font-extrabold tracking-tight font-headline text-on-surface">Grafo de Correlativas</h1>
        <p class="text-on-surface-variant max-w-xl">Mapa interactivo de Ingeniería en Sistemas de Información. Visualiza tu progreso académico y planifica tus próximos pasos.</p>
      </div>
      ${stats}
    </header>
    <div class="flex items-center gap-2 mb-6">
      <button class="px-5 py-2 rounded-xl text-sm font-bold tracking-wide bg-primary text-on-primary shadow-[0_0_20px_rgba(173,198,255,.25)]">Troncales</button>
      <button class="px-5 py-2 rounded-xl text-sm font-bold tracking-wide bg-surface-container-high/40 text-on-surface-variant hover:bg-surface-container-high">Electivas</button>
    </div>
